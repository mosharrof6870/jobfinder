<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Finder | Mosharrof Hossain</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Opportunity Finder 🚀</h1>
                <p>Curated Freelance & Remote Projects for Solo Developers</p>
            </div>
            <div class="header-right">
                <div class="stats-card">
                    <span id="activeCount" class="stat-number">0</span>
                    <span class="stat-label">Active Jobs</span>
                </div>
                <button id="refreshBtn" class="primary-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                    Refresh
                </button>
            </div>
        </header>

        <div class="filters" id="tab-navigation">
            <button class="filter-btn active" data-tab="latest-tab">🔥 Latest</button>
            <button class="filter-btn" data-tab="jobs-tab">💼 Jobs & Internships</button>
            <button class="filter-btn" data-tab="funding-tab">🎓 Scholarships & Funding</button>
            <button class="filter-btn" data-tab="professors-tab">🔬 Professors (Emails)</button>
            <button class="filter-btn" data-tab="papers-tab">📄 Research Papers</button>
        </div>

        <main>
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>Loading your opportunities...</p>
            </div>
            
            <div id="content-area" style="display: none;">
                <section id="latest-tab" class="category-section">
                    <div id="latest-grid" class="job-grid"></div>
                </section>

                <section id="jobs-tab" class="category-section" style="display: none;">
                    <div id="jobs-grid" class="job-grid"></div>
                </section>
                
                <section id="funding-tab" class="category-section" style="display: none;">
                    <div id="funding-grid" class="job-grid"></div>
                </section>

                <section id="professors-tab" class="category-section" style="display: none;">
                    <div id="professors-grid" class="job-grid"></div>
                </section>
                
                <section id="papers-tab" class="category-section" style="display: none;">
                    <div id="papers-grid" class="job-grid"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
