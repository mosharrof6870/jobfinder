name: Auto Scraper Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3

      - name: Run Scraper
        env:
          GITHUB_ACTIONS: "true"
        run: |
          python opportunity_finder.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [[ -n $(git status -s jobs_database.json) ]]; then
            git add jobs_database.json
            git commit -m "Auto-update: New opportunities from global APIs"
            git push
          else
            echo "No new jobs found. Skipping commit."
          fi
